<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - Boutique de Champions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <!-- Header -->
    <header class="bg-[#0a1428] border-b border-[#1e2d3d] px-6 py-4">
        <div class="max-w-[1920px] mx-auto flex items-center gap-6">
            <!-- Filter Button - Left -->
            <button class="btn">
                <svg class="icon" viewBox="0 0 24 24">
                    <line x1="4" y1="21" x2="4" y2="14"></line>
                    <line x1="4" y1="10" x2="4" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12" y2="3"></line>
                    <line x1="20" y1="21" x2="20" y2="16"></line>
                    <line x1="20" y1="12" x2="20" y2="3"></line>
                    <line x1="1" y1="14" x2="7" y2="14"></line>
                    <line x1="9" y1="8" x2="15" y2="8"></line>
                    <line x1="17" y1="16" x2="23" y2="16"></line>
                </svg>
                Filtres
            </button>

            <!-- Search Bar - Center -->
            <div class="flex-1 max-w-2xl mx-auto relative">
                
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Rechercher un champion..." 
                    class="search-input"
                />
            </div>

            <!-- Profile Button - Right -->
            <button class="btn">
                <svg class="icon" viewBox="0 0 24 24">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Profil
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="p-8">
        <div id="championGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Champions will be inserted here by JavaScript -->
        </div>
    </main>

    <script>
        // Champion data
        const champions = [
            {
                id: 1,
                name: "Garen",
                title: "Le Pouvoir de Demacia",
                price: 450,
                imageUrl: "https://images.unsplash.com/photo-1765606290905-b9d377ea4d5e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwd2FycmlvciUyMGNoYXJhY3RlcnxlbnwxfHx8fDE3NzI1MzQ4ODl8MA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 2,
                name: "Lux",
                title: "La Dame de Lumière",
                price: 3150,
                imageUrl: "https://images.unsplash.com/photo-1759207291235-75bcc145b20d?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwc29yY2VyZXNzJTIwd2l0Y2h8ZW58MXx8fHwxNzcyNTM0ODkwfDA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 3,
                name: "Ryze",
                title: "Le Mage Runique",
                price: 450,
                imageUrl: "https://images.unsplash.com/photo-1760574772950-f37de9dce85c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwbWFnZSUyMHdpemFyZHxlbnwxfHx8fDE3NzI0ODk1NzN8MA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 4,
                name: "Ashe",
                title: "L'Archère de Glace",
                price: 450,
                imageUrl: "https://images.unsplash.com/photo-1562008752-2459495a0c05?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwYXJjaGVyJTIwcmFuZ2VyfGVufDF8fHx8MTc3MjUzNDg4OXww&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 5,
                name: "Zed",
                title: "Le Maître des Ombres",
                price: 4800,
                imageUrl: "https://images.unsplash.com/photo-1691390927195-3f3b16849982?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwYXNzYXNzaW4lMjBuaW5qYXxlbnwxfHx8fDE3NzI1MzQ4ODl8MA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 6,
                name: "Darius",
                title: "La Main de Noxus",
                price: 4800,
                imageUrl: "https://images.unsplash.com/photo-1763296557834-a64fe17e513e?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwa25pZ2h0JTIwYXJtb3J8ZW58MXx8fHwxNzcyNTM0ODkwfDA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 7,
                name: "Aatrox",
                title: "La Lame des Darkin",
                price: 4800,
                imageUrl: "https://images.unsplash.com/photo-1770610973306-a09b57e6dc52?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwZGVtb24lMjBjcmVhdHVyZXxlbnwxfHx8fDE3NzI1MzQ4OTB8MA&ixlib=rb-4.1.0&q=80&w=1080"
            },
            {
                id: 8,
                name: "Shyvana",
                title: "La Demi-Dragon",
                price: 3150,
                imageUrl: "https://images.unsplash.com/photo-1763315371278-623eeaae97cb?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxmYW50YXN5JTIwZHJhZ29uJTIwbW9uc3RlcnxlbnwxfHx8fDE3NzI1MzQ4OTB8MA&ixlib=rb-4.1.0&q=80&w=1080"
            }
        ];

        // Function to create a champion card
        function createChampionCard(champion) {
            return `
                <div class="champion-card">
                    <div class="aspect-square overflow-hidden">
                        <img src="${champion.imageUrl}" alt="${champion.name}" />
                    </div>
                    <div class="champion-overlay">
                        <h3 class="text-white font-semibold text-lg mb-1">${champion.name}</h3>
                        <p class="text-gray-400 text-sm mb-2">${champion.title}</p>
                        <div class="flex items-center justify-between">
                            <span class="text-[#c8aa6e] font-bold">${champion.price} RP</span>
                            <button class="btn-primary" onclick="buyChampion('${champion.name}')">
                                Acheter
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Function to render champions
        function renderChampions(championsToRender) {
            const grid = document.getElementById('championGrid');
            grid.innerHTML = championsToRender.map(createChampionCard).join('');
        }

        // Function to buy a champion
        function buyChampion(championName) {
            alert(`Vous avez acheté ${championName}!`);
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredChampions = champions.filter(champion => 
                champion.name.toLowerCase().includes(searchTerm) ||
                champion.title.toLowerCase().includes(searchTerm)
            );
            renderChampions(filteredChampions);
        });

        // Initial render
        renderChampions(champions);
    </script>
</body>
</html>
