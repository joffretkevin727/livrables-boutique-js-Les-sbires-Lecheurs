<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Panier - Poro Corp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend/css/cart.css">
</head>
<body class="bg-[#00395f] text-white">
    <header class="p-6 border-b border-sky-400 flex justify-between items-center">
        <a href="catalogue" class="text-[#d4af37] font-bold">← Retour Boutique</a>
        <h1 class="text-2xl uppercase tracking-widest text-[#d4af37]">Mon Panier</h1>
        <div id="user-display" class="text-sky-400"></div>
    </header>

    <main class="max-w-5xl mx-auto p-8">
        <div id="cart-content" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4" id="cart-items">
                </div>

            <div class="bg-[#002a46] p-6 rounded-lg border border-[#d4af37] h-fit">
                <h2 class="text-xl mb-4 border-b border-gray-600 pb-2">Résumé</h2>
                <div class="flex justify-between mb-2">
                    <span>Sous-total</span>
                    <span id="subtotal">0 RP</span>
                </div>
                <div class="flex justify-between font-bold text-lg text-[#d4af37] mt-4">
                    <span>Total</span>
                    <span id="total-price">0 RP</span>
                </div>
                <button onclick="proceedToCheckout()" class="w-full bg-[#d4af37] text-[#001524] py-3 mt-6 rounded font-bold uppercase hover:bg-[#f0c642]">
                    Passer à la livraison
                </button>
            </div>
        </div>
    </main>
    <script src="frontend/script/cart.js"></script>
</body>
</html>
