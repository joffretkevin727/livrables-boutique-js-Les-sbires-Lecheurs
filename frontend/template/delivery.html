<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Livraison - Poro Corp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend/css/header.css">
    <link rel="stylesheet" href="frontend/css/delivery.css">
</head>
<body class="bg-[#00395f] text-white">
    <header>
        <button class="btnporo" onclick="window.location.href='catalogue'">
            <img class="poro" src="frontend/img/poro.png" alt="Logo">
        </button>
        <div class="tbtn">
            <button class="btn" onclick="window.location.href='cart'">Retour Panier</button>
            <button class="btn" onclick="window.location.href='profil'">Profil</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-8">
        <h2 class="text-3xl text-[#d4af37] font-bold mb-8 uppercase tracking-widest text-center">Finaliser l'expédition</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <section class="bg-[#002a46] p-6 rounded-lg border border-sky-400">
                <h3 class="text-xl text-sky-400 mb-4">Choisir une adresse</h3>
                <div id="address-container" class="space-y-3">
                    </div>
                
                <hr class="my-6 border-gray-700">
                
                <h3 class="text-lg text-[#d4af37] mb-2">Ajouter une nouvelle adresse</h3>
                <form id="add-address-form" class="space-y-3">
                    <input type="text" id="street" placeholder="Rue" class="w-full bg-[#001524] p-2 border border-gray-600 rounded" required>
                    <div class="flex gap-2">
                        <input type="text" id="city" placeholder="Ville" class="w-1/2 bg-[#001524] p-2 border border-gray-600 rounded" required>
                        <input type="text" id="zip" placeholder="Code Postal" class="w-1/2 bg-[#001524] p-2 border border-gray-600 rounded" required>
                    </div>
                    <input type="text" id="country" placeholder="Pays" class="w-full bg-[#001524] p-2 border border-gray-600 rounded" required>
                    <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 py-2 rounded font-bold">Enregistrer l'adresse</button>
                </form>
            </section>

            <section class="bg-[#002a46] p-6 rounded-lg border border-[#d4af37] h-fit">
                <h3 class="text-xl text-[#d4af37] mb-4">Total de la commande</h3>
                <div id="summary-items" class="text-sm text-gray-300 mb-4 border-b border-gray-700 pb-4">
                    </div>
                <div class="text-2xl font-bold text-center py-4">
                    Total : <span id="final-total">0</span> RP
                </div>
                <button onclick="placeOrder()" id="btn-pay" class="w-full bg-[#d4af37] text-[#001524] py-4 rounded font-bold uppercase hover:scale-105 transition-transform">
                    Confirmer et Payer
                </button>
            </section>
        </div>
    </main>

    <script src="frontend/script/delivery.js"></script>
</body>
</html>
