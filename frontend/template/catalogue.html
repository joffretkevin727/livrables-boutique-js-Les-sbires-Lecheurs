<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends - Boutique de Champions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="frontend/css/catalogue.css">
    <link rel="stylesheet" href="frontend/css/card.css">
    <link rel="stylesheet" href="frontend/css/header.css">
</head>

<body>
    <header>
    <button class="btnporo" onclick="window.location.href='catalogue'">
        <img class="poro" src="frontend/img/poro.png" alt="Logo">
    </button>
    <div class="tbtn">
        <div class="relative inline-block text-left">
            <button class="btn" onclick="toggleFilterMenu()">Filtres</button>
            
            <div id="filter-menu" class="hidden absolute left-0 mt-2 w-72 bg-[#002a46] border border-sky-900 rounded-lg shadow-2xl z-50 p-6">
                <div class="space-y-4 text-white">
                    <div>
                        <p class="text-[#d4af37] text-xs uppercase font-bold mb-2 border-b border-sky-900 pb-1">Rôles</p>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center gap-2"><input type="checkbox" value="Assassin" class="filter-role"> Assassin</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Combattant" class="filter-role"> Combattant</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Mage" class="filter-role"> Mage</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Tireur" class="filter-role"> Tireur</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Support" class="filter-role"> Support</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Tank" class="filter-role"> Tank</label>
                        </div>
                    </div>

                    <div>
                        <p class="text-[#d4af37] text-xs uppercase font-bold mb-2 border-b border-sky-900 pb-1">Difficulté</p>
                        <div class="flex flex-col gap-1 text-sm">
                            <label class="flex items-center gap-2"><input type="checkbox" value="Facile" class="filter-diff"> Facile</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Moyen" class="filter-diff"> Moyen</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Difficile" class="filter-diff"> Difficile</label>
                        </div>
                    </div>

                    <div>
                        <p class="text-[#d4af37] text-xs uppercase font-bold mb-2 border-b border-sky-900 pb-1">Genre</p>
                        <div class="flex gap-4 text-sm">
                            <label class="flex items-center gap-2"><input type="checkbox" value="Masculin" class="filter-genre"> M</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Féminin" class="filter-genre"> F</label>
                            <label class="flex items-center gap-2"><input type="checkbox" value="Autre" class="filter-genre"> Autre</label>
                        </div>
                    </div>

                    <button onclick="applyFilters()" class="w-full bg-[#d4af37] text-[#001524] py-2 rounded font-bold hover:bg-yellow-500 mt-4 uppercase text-xs tracking-widest">
                        Appliquer
                    </button>
                </div>
            </div>
        </div>

        <div class="search">
            <input type="text" id="searchInput" placeholder="Rechercher..." class="search-input" />
        </div>
        <button class="btn" onclick="window.location.href='profil'">Profil</button>
    </div>
</header>
    <!--grille de perso-->
    <div class="tableau" id="catalog-container">

    </div>
    <script src="frontend/script/catalogue.js"></script>
</body>

</html>
